name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

# [SAMPLE] CI uses only fixture/sample data — no secrets, no live API calls
# All tests run against in-memory or mocked data.
# No real Polymarket trades can be executed in CI.

permissions:
  contents: read

jobs:
  backend-lint-and-test:
    name: Python lint + tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type check (ruff pyflakes)
        run: ruff check src tests --select F

      - name: Tests (pytest)
        run: pytest tests/ -q --tb=short

  frontend:
    name: Frontend lint + typecheck + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check (TypeScript)
        run: npm run typecheck

      - name: Tests (Vitest)
        run: npm test

      - name: Build (Vite)
        run: npm run build
