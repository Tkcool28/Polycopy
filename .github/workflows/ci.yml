name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

# [SAMPLE] CI uses only fixture/sample data — no secrets, no live API calls
# All tests run against in-memory or mocked data.
# No real Polymarket trades can be executed in CI.

permissions:
  contents: read

jobs:
  backend-lint-and-test:
    name: Python lint + tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install "ruff==0.16.0"

      - name: Ruff no-new-debt check
        id: ruff_delta
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BASE_DIR: ${{ runner.temp }}/polycopy-ruff-base
          BASE_JSON: ${{ runner.temp }}/ruff-base.json
          HEAD_JSON: ${{ runner.temp }}/ruff-head.json
          DELTA_REPORT: ${{ runner.temp }}/ruff-delta.txt
        run: |
          set -euo pipefail
          ruff check src tests scripts/ci/check_ruff_delta.py \
            --output-format=json > "$HEAD_JSON" || true
          git worktree add --detach "$BASE_DIR" "$BASE_SHA"
          (
            cd "$BASE_DIR"
            ruff check src tests --output-format=json > "$BASE_JSON" || true
          )
          python scripts/ci/check_ruff_delta.py \
            --base "$BASE_JSON" \
            --head "$HEAD_JSON" \
            --base-root "$BASE_DIR" \
            --head-root "$GITHUB_WORKSPACE" | tee "$DELTA_REPORT"

      - name: Upload Ruff delta report
        if: github.event_name == 'pull_request' && steps.ruff_delta.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: ruff-delta-python-${{ matrix.python-version }}
          path: ${{ runner.temp }}/ruff-delta.txt
          if-no-files-found: error
          retention-days: 7

      - name: Enforce Ruff no-new-debt result
        if: github.event_name == 'pull_request' && steps.ruff_delta.outcome == 'failure'
        run: exit 1

      - name: Ruff inventory on main
        if: github.event_name == 'push'
        run: ruff check src tests scripts/ci/check_ruff_delta.py --output-format=concise --exit-zero

      - name: Tests (pytest)
        run: pytest tests/ -q --tb=short

  frontend:
    name: Frontend lint + typecheck + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check (TypeScript)
        run: npm run typecheck

      - name: Tests (Vitest)
        run: npm test

      - name: Build (Vite)
        run: npm run build
